<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Cost Portal</title>
  <meta name="description" content="FOB vendor cost collection, comparison and program placement portal">
  <link rel="stylesheet" href="styles.css?v=120">
</head>

<body>

  <!-- ── Login Screen ──────────────────────────────────────── -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon-lg">💼</div>
        <h1>Vendor Cost Portal</h1>
        <p>FOB costing, comparison &amp; program placement</p>
      </div>
      <div id="login-error" class="alert alert-danger" style="display:none"></div>
      <form id="login-form" onsubmit="App._login(event)">
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input class="form-input" id="login-email" type="email" placeholder="you@company.com" required
            autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-input" id="login-password" type="password" placeholder="••••••••" required
            autocomplete="current-password">
        </div>
        <button class="btn btn-primary w-full" type="submit" style="justify-content:center;margin-top:8px">Sign In
          →</button>
      </form>

      <!-- Microsoft sign-in (revealed by app.js if /api/auth/config reports enabled) -->
      <div id="ms-signin-wrap" style="display:none;margin-top:16px">
        <div style="display:flex;align-items:center;gap:12px;color:#64748b;font-size:0.8rem;margin:8px 0 12px">
          <div style="flex:1;height:1px;background:#1e293b"></div>
          <span>OR</span>
          <div style="flex:1;height:1px;background:#1e293b"></div>
        </div>
        <a id="ms-signin-btn" href="/api/auth/microsoft/login"
           class="btn w-full"
           style="justify-content:center;background:#fff;color:#1e293b;border:1px solid #cbd5e1;font-weight:600;text-decoration:none">
          <svg width="18" height="18" viewBox="0 0 23 23" style="margin-right:8px;vertical-align:-3px" aria-hidden="true">
            <rect x="1"  y="1"  width="10" height="10" fill="#f25022"/>
            <rect x="12" y="1"  width="10" height="10" fill="#7fba00"/>
            <rect x="1"  y="12" width="10" height="10" fill="#00a4ef"/>
            <rect x="12" y="12" width="10" height="10" fill="#ffb900"/>
          </svg>
          Sign in with Microsoft
        </a>
      </div>

      <p class="text-center text-muted text-sm" style="margin-top:24px">
        Admin: <code>admin@company.com</code> / <code>admin123</code><br>
        Trading Co. demo: <code>shk@vendor.com</code> / <code>vendor123</code>
      </p>
    </div>
  </div>

  <!-- ── Main App ───────────────────────────────────────────── -->
  <div id="main-layout" style="display:none">

    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">
          <div class="logo-icon">💼</div>
          <div>
            <div class="logo-text">Cost Portal</div>
            <div class="logo-sub">Vendor FOB Management</div>
          </div>
        </div>
      </div>
      <div id="sidebar-nav"></div>
      <div class="sidebar-footer">
        <div id="sidebar-user"></div>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="content"></main>

  </div>

  <!-- Sidebar toggle (outside layout so it never slides with the sidebar) -->
  <button id="sidebar-toggle" title="Toggle sidebar" onclick="App.toggleSidebar()">◀</button>

  <!-- Modals: overlay wraps box so flex-centering works -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="App.closeModalOutside(event)">
    <div id="modal-box" class="modal hidden"></div>
  </div>

  <!-- SheetJS: client-side Excel (.xlsx / .xls) parser.
       Vendored to /vendor so downloads/uploads work when the CDN is
       blocked (corp firewall, ad-blocker, offline). -->
  <script src="vendor/xlsx.full.min.js"></script>

  <!-- Scripts -->
  <script src="api.js?v=120"></script>
  <script src="views-admin.js?v=120"></script>
  <script src="views-vendor.js?v=120"></script>
  <script src="app.js?v=120"></script>

  <!-- ── Inline login: works even if app.js fails to init ──────── -->
  <script>
  (function () {
    // Show any uncaught JS errors as a visible banner
    window.onerror = function (msg, src, line, col, err) {
      var banner = document.getElementById('_errbanner');
      if (!banner) {
        banner = document.createElement('div');
        banner.id = '_errbanner';
        banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:99999;background:#7f1d1d;color:#fecaca;font-family:monospace;font-size:12px;padding:10px 16px;word-break:break-all;white-space:pre-wrap';
        document.body.appendChild(banner);
      }
      banner.textContent = (err && err.stack ? err.stack : msg) + ' @ ' + src + ':' + line;
      return false;
    };

    function _inlineLogin(e) {
      e.preventDefault();
      var email    = (document.getElementById('login-email').value    || '').trim();
      var password = (document.getElementById('login-password').value || '').trim();
      var errEl    = document.getElementById('login-error');

      // Safe App check — use try/catch instead of typeof (typeof throws for TDZ const)
      var appReady = false;
      try { appReady = !!App && typeof App._login === 'function'; } catch(e) {}
      if (appReady) { return App._login(e); }

      // Fallback: call the server API directly
      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password }),
      })
      .then(function(res) { return res.json().then(function(d) { return { ok: res.ok, data: d }; }); })
      .then(function(result) {
        if (!result.ok) {
          if (errEl) { errEl.style.display=''; errEl.textContent = result.data.error || 'Invalid email or password'; }
          return;
        }
        localStorage.setItem('vcp_token', result.data.token);
        window.location.replace(window.location.pathname);
      })
      .catch(function(ex) {
        if (errEl) { errEl.style.display=''; errEl.textContent='Login error: '+ex.message; }
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      var form = document.getElementById('login-form');
      if (form) form.onsubmit = _inlineLogin;
    });
  })();
  </script>
</body>

</html>
