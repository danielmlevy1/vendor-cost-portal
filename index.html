<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Cost Portal</title>
  <meta name="description" content="FOB vendor cost collection, comparison and program placement portal">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ── Login Screen ──────────────────────────────────────── -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon-lg">💼</div>
        <h1>Vendor Cost Portal</h1>
        <p>FOB costing, comparison &amp; program placement</p>
      </div>
      <div id="login-error" class="alert alert-danger" style="display:none"></div>
      <form id="login-form" onsubmit="App._login(event)">
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input class="form-input" id="login-email" type="email" placeholder="you@company.com" required
            autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-input" id="login-password" type="password" placeholder="••••••••" required
            autocomplete="current-password">
        </div>
        <button class="btn btn-primary w-full" type="submit" style="justify-content:center;margin-top:8px">Sign In
          →</button>
      </form>
      <p class="text-center text-muted text-sm" style="margin-top:24px">
        Admin: <code>admin@company.com</code> / <code>admin123</code><br>
        Trading Co. demo: <code>shk@vendor.com</code> / <code>vendor123</code>
      </p>
    </div>
  </div>

  <!-- ── Main App ───────────────────────────────────────────── -->
  <div id="main-layout" style="display:none">

    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">
          <div class="logo-icon">💼</div>
          <div>
            <div class="logo-text">Cost Portal</div>
            <div class="logo-sub">Vendor FOB Management</div>
          </div>
        </div>
      </div>
      <div id="sidebar-nav"></div>
      <div class="sidebar-footer">
        <div id="sidebar-user"></div>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="content"></main>

  </div>

  <!-- Sidebar toggle (outside layout so it never slides with the sidebar) -->
  <button id="sidebar-toggle" title="Toggle sidebar" onclick="App.toggleSidebar()">◀</button>

  <!-- Modals: overlay wraps box so flex-centering works -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="App.closeModalOutside(event)">
    <div id="modal-box" class="modal hidden"></div>
  </div>

  <!-- SheetJS: client-side Excel (.xlsx / .xls) parser -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <!-- Scripts -->
  <script src="db.js?v=82"></script>
  <script src="views-admin.js?v=82"></script>
  <script src="views-vendor.js?v=82"></script>
  <script src="app.js?v=82"></script>

  <!-- ── Inline login: works even if app.js fails to init ──────── -->
  <script>
  (function () {
    // Show any uncaught JS errors as a visible banner
    window.onerror = function (msg, src, line, col, err) {
      var banner = document.getElementById('_errbanner');
      if (!banner) {
        banner = document.createElement('div');
        banner.id = '_errbanner';
        banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:99999;background:#7f1d1d;color:#fecaca;font-family:monospace;font-size:12px;padding:10px 16px;word-break:break-all;white-space:pre-wrap';
        document.body.appendChild(banner);
      }
      banner.textContent = (err && err.stack ? err.stack : msg) + ' @ ' + src + ':' + line;
      return false;
    };

    function _inlineLogin(e) {
      e.preventDefault();
      var email    = (document.getElementById('login-email').value    || '').trim();
      var password = (document.getElementById('login-password').value || '').trim();
      var errEl    = document.getElementById('login-error');

      // Safe App check — use try/catch instead of typeof (typeof throws for TDZ const)
      var appReady = false;
      try { appReady = !!App && typeof App._login === 'function'; } catch(e) {}
      if (appReady) { return App._login(e); }

      // Fallback: localStorage auth (mirrors DB.Auth.login exactly)
      try {
        var SEED_USERS = [
          { id:'admin',    email:'admin@company.com',   password:'admin123',  role:'admin' },
          { id:'pc1',      email:'pc@company.com',       password:'pc123',     role:'pc' },
          { id:'planning1',email:'planning@company.com', password:'plan123',   role:'planning' },
          { id:'sales1',   email:'sales@company.com',    password:'sales123',  role:'planning' },
          { id:'design1',  email:'design@company.com',   password:'design123', role:'design' },
          { id:'techdes1', email:'techdesign@company.com',password:'tech123',  role:'design' },
        ];
        var users = JSON.parse(localStorage.getItem('vcp_users') || 'null') || SEED_USERS;
        var tcs   = JSON.parse(localStorage.getItem('vcp_trading_companies') || '[]');
        var user  = users.find(function(u){ return u.email===email && u.password===password; });
        if (!user) {
          var tc = tcs.find(function(t){ return t.email===email && t.password===password; });
          if (tc) user = { id:tc.id, name:tc.name, email:tc.email, role:'vendor', tcId:tc.id };
        }
        if (!user) {
          if (errEl) { errEl.style.display=''; errEl.textContent='Invalid email or password'; }
          return;
        }
        localStorage.setItem('vcp_session', JSON.stringify(user));
        // Reload so App.init() picks up the session (or stays in fallback mode)
        window.location.replace(window.location.pathname);
      } catch(ex) {
        if (errEl) { errEl.style.display=''; errEl.textContent='Login error: '+ex.message; }
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      var form = document.getElementById('login-form');
      if (form) form.onsubmit = _inlineLogin;
    });
  })();
  </script>
</body>

</html>
